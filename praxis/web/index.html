<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Praxis</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#272b34; --ink:#e7e9ee; --dim:#9aa3b2;
          --me:#2b3b57; --bot:#20242e; --accent:#5b8cff; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  header { padding:14px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px; }
  header b { font-size:18px; letter-spacing:.5px; }
  header span { color:var(--dim); font-size:13px; }
  .wrap { max-width:820px; margin:0 auto; padding:20px; }
  .setup { display:flex; gap:10px; margin-bottom:16px; }
  input, button, textarea { font:inherit; }
  input[type=text], textarea { flex:1; background:var(--panel); border:1px solid var(--line);
          color:var(--ink); border-radius:10px; padding:11px 13px; resize:none; }
  button { background:var(--accent); color:#fff; border:0; border-radius:10px; padding:11px 18px;
          cursor:pointer; font-weight:600; }
  button:disabled { opacity:.45; cursor:default; }
  button.ghost { background:transparent; border:1px solid var(--line); color:var(--dim); }
  #chat { display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
  .msg { padding:10px 14px; border-radius:12px; max-width:82%; white-space:pre-wrap; }
  .bot { background:var(--bot); border:1px solid var(--line); align-self:flex-start; border-bottom-left-radius:4px; }
  .me  { background:var(--me); align-self:flex-end; border-bottom-right-radius:4px; }
  .status { color:var(--dim); font-style:italic; align-self:center; text-align:center; font-size:14px; }
  .composer { display:flex; gap:10px; }
  .deliverable { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:8px 26px 22px; margin-top:8px; }
  .deliverable h1 { font-size:24px; } .deliverable h2 { font-size:18px; margin-top:22px; color:var(--accent); }
  .deliverable h3 { font-size:15px; margin:16px 0 2px; }
  .deliverable em { color:var(--dim); font-style:normal; font-size:13px; }
  .saved { color:var(--dim); font-size:13px; margin-top:10px; }
  .hidden { display:none; }
</style>
</head>
<body>
<header><b>PRAXIS</b><span>offline AI-implementation firm — a real interview, your real answers</span></header>
<div class="wrap">
  <div class="setup" id="setup">
    <input type="text" id="name" placeholder="Business name (e.g. Maria's HVAC)" autofocus>
    <button id="startBtn">Start interview</button>
  </div>

  <div id="chat"></div>

  <div class="composer hidden" id="composer">
    <textarea id="answer" rows="2" placeholder="Answer in your own words…"></textarea>
    <button id="sendBtn">Send</button>
  </div>

  <div class="deliverable hidden" id="deliverable"></div>
  <div class="saved hidden" id="saved"></div>
  <div style="margin-top:18px"><button class="ghost hidden" id="againBtn">Start another engagement</button></div>
</div>

<script>
const chat = document.getElementById('chat');
const setup = document.getElementById('setup');
const composer = document.getElementById('composer');
const answer = document.getElementById('answer');
const nameEl = document.getElementById('name');
let ws;

function bubble(text, cls){ const d=document.createElement('div'); d.className='msg '+cls; d.textContent=text; chat.appendChild(d); window.scrollTo(0,document.body.scrollHeight); return d; }
function status(text){ const d=document.createElement('div'); d.className='status'; d.textContent=text; chat.appendChild(d); window.scrollTo(0,document.body.scrollHeight); }

// tiny, safe markdown -> html (headings, lists, bold, emphasis lines)
function esc(s){ return s.replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function md(text){
  const out=[]; let inList=false;
  for(let raw of text.split('\n')){
    let l=esc(raw.trimEnd());
    l=l.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    if(/^### /.test(l)){ if(inList){out.push('</ul>');inList=false;} out.push('<h3>'+l.slice(4)+'</h3>'); }
    else if(/^## /.test(l)){ if(inList){out.push('</ul>');inList=false;} out.push('<h2>'+l.slice(3)+'</h2>'); }
    else if(/^# /.test(l)){ if(inList){out.push('</ul>');inList=false;} out.push('<h1>'+l.slice(2)+'</h1>'); }
    else if(/^\*(.+)\*$/.test(l)){ out.push('<p><em>'+l.slice(1,-1)+'</em></p>'); }
    else if(/^- /.test(l)){ if(!inList){out.push('<ul>');inList=true;} out.push('<li>'+l.slice(2)+'</li>'); }
    else { if(inList){out.push('</ul>');inList=false;} if(l) out.push('<p>'+l+'</p>'); }
  }
  if(inList) out.push('</ul>');
  return out.join('');
}

function connect(){
  ws = new WebSocket('ws://'+location.host+'/ws');
  ws.onmessage = ev => {
    const m = JSON.parse(ev.data);
    if(m.type==='bot') bubble(m.text,'bot');
    else if(m.type==='status') status(m.text);
    else if(m.type==='deliverable'){
      composer.classList.add('hidden');
      const box=document.getElementById('deliverable'); box.innerHTML=md(m.markdown); box.classList.remove('hidden');
      const s=document.getElementById('saved'); s.textContent='Saved to '+m.saved; s.classList.remove('hidden');
      document.getElementById('againBtn').classList.remove('hidden');
    }
  };
}

document.getElementById('startBtn').onclick = () => {
  const name = nameEl.value.trim(); if(!name) { nameEl.focus(); return; }
  connect();
  ws.onopen = () => ws.send(JSON.stringify({type:'start', name}));
  setup.classList.add('hidden'); composer.classList.remove('hidden'); answer.focus();
};
function send(){ const t=answer.value.trim(); if(!t||!ws) return; bubble(t,'me'); ws.send(JSON.stringify({type:'msg', text:t})); answer.value=''; }
document.getElementById('sendBtn').onclick = send;
answer.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }});
document.getElementById('againBtn').onclick = () => location.reload();
</script>
</body>
</html>
