<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vib">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <title>Vib</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- Entry Screen -->
    <div id="entry-screen" class="screen active">
        <div class="entry-container">
            <h1 class="logo">vib</h1>
            <p class="tagline">hey</p>
            <div class="name-group">
                <input type="text" id="name-input" placeholder="your name" maxlength="30" autocomplete="off">
            </div>
            <button id="start-btn" class="btn-start">start</button>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen" class="screen">
        <header class="chat-header">
            <div class="header-left">
                <span class="logo-sm">vib</span>
                <span id="phase-indicator" class="phase-badge">first contact</span>
            </div>
            <div class="header-right">
                <button id="soul-btn" class="btn-soul" title="Your Soul">soul</button>
            </div>
        </header>

        <div id="chat-messages" class="chat-messages"></div>

        <form id="chat-form" class="chat-form">
            <input type="text" id="chat-input" placeholder="say something..." autocomplete="off">
            <button type="submit" class="btn-send">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
            </button>
        </form>
    </div>

    <!-- Soul Panel (overlay) -->
    <div id="soul-overlay" class="overlay hidden">
        <div class="overlay-panel">
            <div class="overlay-header">
                <h2>your vib</h2>
                <button id="close-soul" class="btn-close">&times;</button>
            </div>
            <div id="soul-body" class="soul-body"></div>
            <div id="mirror-section" class="mirror-section hidden">
                <button id="mirror-btn" class="btn-mirror">meet your digital twin</button>
            </div>
        </div>
    </div>

    <!-- Mirror Mode Screen -->
    <div id="mirror-screen" class="screen">
        <header class="chat-header mirror-header">
            <div class="header-left">
                <span class="logo-sm mirror-logo">soul</span>
                <span class="phase-badge mirror-badge">digital twin</span>
            </div>
            <div class="header-right">
                <button id="exit-mirror-btn" class="btn-soul">back</button>
            </div>
        </header>

        <div id="mirror-messages" class="chat-messages"></div>

        <form id="mirror-form" class="chat-form">
            <input type="text" id="mirror-input" placeholder="talk to your soul..." autocomplete="off">
            <button type="submit" class="btn-send">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
            </button>
        </form>
    </div>

    <script src="/static/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js');
        }
    </script>
</body>
</html>
